<!-- JavaScript for the test itself -->
<!-- Fully generic: axis keys are read from questions[0].effect, so adding/removing/renaming
     axes only ever requires editing questions.js (and the AXES config in results.html). -->
<script>
    var axisKeys = Object.keys(questions[0].effect); // e.g. ["ground","intel","aid","enforce","manage","energy","prole"]
    var maxScore = {}; // Max possible score per axis
    axisKeys.forEach(function(k) { maxScore[k] = 0; });

    let answerArrays = {}; // one array of per-question weighted effects, per axis
    axisKeys.forEach(function(k) { answerArrays[k] = new Array(questions.length); });

    var qn = 0; // Question number
    init_question();

    for (var i = 0; i < questions.length; i++) {
        axisKeys.forEach(function(k) {
            maxScore[k] += Math.abs(questions[i].effect[k] || 0);
        });
    }

    function init_question() {
        document.getElementById("question-text").innerHTML = questions[qn].question;
        document.getElementById("question-number").innerHTML = "Question " + (qn + 1) + " of " + (questions.length);
        if (qn == 0) {
            document.getElementById("back_button").style.display = 'none';
            document.getElementById("back_button_off").style.display = 'block';
        } else {
            document.getElementById("back_button").style.display = 'block';
            document.getElementById("back_button_off").style.display = 'none';
        }
    }

    function next_question(mult) {
        axisKeys.forEach(function(k) {
            answerArrays[k][qn] = mult * (questions[qn].effect[k] || 0);
        });
        qn++;
        if (qn < questions.length) {
            init_question();
        } else {
            results();
        }
    }

    function prev_question() {
        if (qn == 0) {
            return;
        }
        qn--;
        init_question();
    }

    function calc_score(score, max) {
        if (max == 0) { return "50.0"; } // axis with no weighted questions defaults to neutral
        return (100 * (max + score) / (2 * max)).toFixed(1)
    }

    function results() {
        var params = axisKeys.map(function(k) {
            let total = answerArrays[k].reduce((a, b) => a + b, 0);
            return k + "=" + calc_score(total, maxScore[k]);
        });
        location.href = "results.html?" + params.join("&");
    }
</script>
