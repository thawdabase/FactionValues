<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactionValues Downloader</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#0d1117;
    color:#e6edf3;
    display:flex;
    justify-content:center;
    padding:50px;
}

.container{
    width:800px;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.header{
    padding:24px;
    border-bottom:1px solid #30363d;
}

.header h1{
    font-size:28px;
    margin-bottom:8px;
}

.header p{
    color:#8b949e;
}

.list{
    padding:20px;
}

.file{
    padding:12px 16px;
    border:1px solid #30363d;
    border-radius:8px;
    margin-bottom:10px;
    background:#0d1117;
    transition:.15s;
}

.file:hover{
    background:#1b222d;
}

.footer{
    padding:20px;
    border-top:1px solid #30363d;
}

button{
    background:#238636;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

button:hover{
    background:#2ea043;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#status{
    margin-top:15px;
    color:#8b949e;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>FactionValues</h1>
<p>Download every file in this folder as a ZIP archive.</p>
</div>

<div class="list" id="files">
Loading...
</div>

<div class="footer">
<button id="download">Download ZIP</button>
<div id="status"></div>
</div>

</div>

<script>

const owner = "thawdabase";
const repo = "FactionValues";
const branch = "master";
const path = "";

const api =
`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;

let files = [];

async function loadFiles(){

    const res = await fetch(api);

    const json = await res.json();

    files = json.filter(f => f.type === "file");

    const container = document.getElementById("files");

    container.innerHTML = "";

    files.forEach(file=>{

        const div = document.createElement("div");
        div.className="file";
        div.textContent=file.name;
        container.appendChild(div);

    });

}

loadFiles();

document.getElementById("download").onclick = async ()=>{

    const button=document.getElementById("download");
    const status=document.getElementById("status");

    button.disabled=true;

    status.textContent="Downloading files...";

    const zip=new JSZip();

    for(const file of files){

        status.textContent=`Downloading ${file.name}`;

        const response=await fetch(file.download_url);

        const blob=await response.blob();

        zip.file(file.name,blob);

    }

    status.textContent="Compressing...";

    const content=await zip.generateAsync({
        type:"blob"
    });

    saveAs(content,"FactionValues.zip");

    status.textContent="Finished.";

    button.disabled=false;

};

</script>

</body>
</html>
